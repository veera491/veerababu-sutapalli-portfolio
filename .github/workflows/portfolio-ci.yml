name: Portfolio CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Build, Lint, and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium and system dependencies
        run: npx playwright install --with-deps chromium

      - name: Run full check (validate, lint, build, E2E)
        run: npm run check:full

      - name: Run production-style check (portfolio.example.test origin)
        run: npm run check:production

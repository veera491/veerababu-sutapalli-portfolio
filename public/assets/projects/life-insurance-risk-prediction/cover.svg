<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <title>Life Insurance Risk Prediction</title>
  <desc>Technical visualization of multi-class risk predictions and model classification boundaries.</desc>
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#121212"/>
    </linearGradient>
    
    <radialGradient id="accent-glow" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#ff6b35" stop-opacity="0.1"/>
      <stop offset="80%" stop-color="#ff6b35" stop-opacity="0.01"/>
      <stop offset="100%" stop-color="#ff6b35" stop-opacity="0"/>
    </radialGradient>

    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="1" stroke-opacity="0.02"/>
    </pattern>
    
    <!-- Gradient for risk distribution curve -->
    <linearGradient id="curve-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a3a3a3" stop-opacity="0.2"/>
      <stop offset="60%" stop-color="#a3a3a3" stop-opacity="0.6"/>
      <stop offset="85%" stop-color="#ff6b35" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#ff6b35" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <!-- Background and Ambient Glow -->
  <rect width="100%" height="100%" fill="url(#bg-grad)"/>
  <rect width="100%" height="100%" fill="url(#accent-glow)"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <!-- Outer frame and tick marks -->
  <rect x="30" y="30" width="740" height="390" fill="none" stroke="#ffffff" stroke-width="1" stroke-opacity="0.05"/>
  <g stroke="#ffffff" stroke-width="1" stroke-opacity="0.2">
    <!-- X-axis ticks -->
    <line x1="150" y1="380" x2="150" y2="385" />
    <line x1="270" y1="380" x2="270" y2="385" />
    <line x1="390" y1="380" x2="390" y2="385" />
    <line x1="510" y1="380" x2="510" y2="385" />
    <line x1="630" y1="380" x2="630" y2="385" />
    <!-- Y-axis ticks -->
    <line x1="80" y1="300" x2="85" y2="300" />
    <line x1="80" y1="220" x2="85" y2="220" />
    <line x1="80" y1="140" x2="85" y2="140" />
  </g>

  <!-- Technical grid/coordinates layout -->
  <line x1="80" y1="380" x2="720" y2="380" stroke="#ffffff" stroke-width="1" stroke-opacity="0.1"/>
  <line x1="80" y1="100" x2="80" y2="380" stroke="#ffffff" stroke-width="1" stroke-opacity="0.1"/>

  <!-- Classification zones backgrounds -->
  <!-- Low risk area -->
  <rect x="80" y="100" width="250" height="280" fill="#ffffff" fill-opacity="0.01"/>
  <!-- Medium risk area -->
  <rect x="330" y="100" width="220" height="280" fill="#ffffff" fill-opacity="0.02"/>
  <!-- High risk area -->
  <rect x="550" y="100" width="170" height="280" fill="#ff6b35" fill-opacity="0.02"/>

  <!-- Division threshold lines -->
  <line x1="330" y1="100" x2="330" y2="380" stroke="#ffffff" stroke-width="0.75" stroke-dasharray="4 6" stroke-opacity="0.2"/>
  <line x1="550" y1="100" x2="550" y2="380" stroke="#ff6b35" stroke-width="0.75" stroke-dasharray="4 6" stroke-opacity="0.3"/>

  <!-- Area under curve (transparent fill) -->
  <path d="M 80 380 Q 200 350 300 240 T 480 150 Q 560 140 620 280 T 720 380 L 80 380 Z" fill="url(#curve-grad)" fill-opacity="0.05"/>

  <!-- Main distribution curve representing applicant risk profile -->
  <path d="M 80 380 Q 200 350 300 240 T 480 150 Q 560 140 620 280 T 720 380" fill="none" stroke="url(#curve-grad)" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Scatter datapoints representing classification samples -->
  <g fill="#ffffff" opacity="0.3">
    <circle cx="150" cy="320" r="3"/>
    <circle cx="210" cy="290" r="2.5"/>
    <circle cx="260" cy="340" r="3"/>
    <circle cx="280" cy="270" r="2"/>
    <circle cx="350" cy="240" r="3"/>
    <circle cx="390" cy="190" r="2.5"/>
    <circle cx="430" cy="210" r="2"/>
    <circle cx="480" cy="160" r="3"/>
  </g>
  <g fill="#ff6b35" opacity="0.6">
    <circle cx="560" cy="180" r="3"/>
    <circle cx="590" cy="150" r="2.5"/>
    <circle cx="610" cy="260" r="3.5"/>
    <circle cx="650" cy="320" r="2.5"/>
    <circle cx="680" cy="350" r="3"/>
  </g>

  <!-- High Risk Warning Crosshairs / Marker -->
  <g transform="translate(590, 150)" stroke="#ff6b35" fill="none">
    <circle cx="0" cy="0" r="8" stroke-width="0.5" stroke-dasharray="2 2"/>
    <circle cx="0" cy="0" r="14" stroke-width="0.5" stroke-opacity="0.5"/>
  </g>

  <!-- Labels -->
  <text x="100" y="365" font-family="monospace" font-size="10" fill="#a3a3a3" letter-spacing="1">ZONE A: DECREASED RISK</text>
  <text x="350" y="365" font-family="monospace" font-size="10" fill="#a3a3a3" letter-spacing="1">ZONE B: STABLE RISK</text>
  <text x="570" y="365" font-family="monospace" font-size="10" fill="#ff6b35" letter-spacing="1">ZONE C: ELEVATED RISK</text>

  <!-- Header metadata -->
  <text x="50" y="60" font-family="monospace" font-size="10" fill="#a3a3a3" opacity="0.4" letter-spacing="1">MODEL: RANDOM_FOREST / N_ESTIMATORS: 100</text>
  <text x="750" y="60" font-family="monospace" font-size="10" fill="#a3a3a3" opacity="0.4" text-anchor="end" letter-spacing="1">SYS.LOC: //ML/RISK_INS_PRED</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <title>Cloud-Based Brain Stroke Detection</title>
  <desc>Technical schema of a cloud-hosted Flask machine learning model and inference service pipeline.</desc>
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#121212"/>
    </linearGradient>
    
    <radialGradient id="accent-glow" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#ff6b35" stop-opacity="0.08"/>
      <stop offset="80%" stop-color="#ff6b35" stop-opacity="0.01"/>
      <stop offset="100%" stop-color="#ff6b35" stop-opacity="0"/>
    </radialGradient>

    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="1" stroke-opacity="0.02"/>
    </pattern>

    <!-- Connector gradient -->
    <linearGradient id="conn-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.2"/>
      <stop offset="50%" stop-color="#ff6b35" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.2"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bg-grad)"/>
  <rect width="100%" height="100%" fill="url(#accent-glow)"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <!-- Border -->
  <rect x="30" y="30" width="740" height="390" fill="none" stroke="#ffffff" stroke-width="1" stroke-opacity="0.05"/>

  <!-- Cloud Infrastructure Architecture Nodes -->
  <g stroke-linecap="round" fill="none">
    <!-- Main flow line -->
    <path d="M 100 225 L 700 225" stroke="url(#conn-grad)" stroke-width="2"/>
    <path d="M 100 225 Q 250 120 400 225 T 700 225" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1" stroke-dasharray="4 4"/>
    
    <!-- Secondary paths to auxiliary service nodes -->
    <path d="M 400 225 L 400 120" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1"/>
    <path d="M 400 225 L 400 330" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1"/>
    
    <!-- Node A: Web Client / UI (Left) -->
    <g transform="translate(100, 225)">
      <circle cx="0" cy="0" r="16" fill="#171717" stroke="#ffffff" stroke-width="1.5" stroke-opacity="0.5"/>
      <rect x="-8" y="-8" width="16" height="16" fill="none" stroke="#ffffff" stroke-width="1" stroke-opacity="0.4"/>
      <text x="0" y="32" font-family="monospace" font-size="9" fill="#a3a3a3" text-anchor="middle" letter-spacing="0.5">CLIENT_APP</text>
    </g>

    <!-- Node B: API Gateway (Middle Left) -->
    <g transform="translate(250, 225)">
      <circle cx="0" cy="0" r="16" fill="#171717" stroke="#ffffff" stroke-width="1.5" stroke-opacity="0.5"/>
      <path d="M -6 -6 L 6 6 M 6 -6 L -6 6" stroke="#ffffff" stroke-width="1" stroke-opacity="0.4"/>
      <text x="0" y="32" font-family="monospace" font-size="9" fill="#a3a3a3" text-anchor="middle" letter-spacing="0.5">API_GATEWAY</text>
    </g>

    <!-- Node C: Flask Core Service (Center) -->
    <g transform="translate(400, 225)">
      <circle cx="0" cy="0" r="24" fill="#171717" stroke="#ff6b35" stroke-width="2.5"/>
      <circle cx="0" cy="0" r="30" fill="none" stroke="#ff6b35" stroke-width="0.5" stroke-opacity="0.3" stroke-dasharray="2 2"/>
      <circle cx="0" cy="0" r="4" fill="#ff6b35"/>
      <text x="0" y="42" font-family="monospace" font-size="10" fill="#ff6b35" font-weight="bold" text-anchor="middle" letter-spacing="0.5">FLASK_SERVER</text>
    </g>

    <!-- Node D: Database / S3 (Bottom Center) -->
    <g transform="translate(400, 330)">
      <circle cx="0" cy="0" r="16" fill="#171717" stroke="#ffffff" stroke-width="1.5" stroke-opacity="0.5"/>
      <path d="M -8 -4 L 8 -4 M -8 0 L 8 0 M -8 4 L 8 4" stroke="#ffffff" stroke-width="1" stroke-opacity="0.4"/>
      <text x="0" y="-24" font-family="monospace" font-size="9" fill="#a3a3a3" text-anchor="middle" letter-spacing="0.5">S3_STORAGE</text>
    </g>

    <!-- Node E: Model Registry (Top Center) -->
    <g transform="translate(400, 120)">
      <circle cx="0" cy="0" r="16" fill="#171717" stroke="#ffffff" stroke-width="1.5" stroke-opacity="0.5"/>
      <polygon points="0,-8 8,6 -8,6" stroke="#ffffff" stroke-width="1" stroke-opacity="0.4"/>
      <text x="0" y="-24" font-family="monospace" font-size="9" fill="#a3a3a3" text-anchor="middle" letter-spacing="0.5">MODEL_REGISTRY</text>
    </g>

    <!-- Node F: Brain Stroke ML Inference Engine (Right) -->
    <g transform="translate(580, 225)">
      <circle cx="0" cy="0" r="20" fill="#171717" stroke="#ffffff" stroke-width="1.5" stroke-opacity="0.5"/>
      <!-- Glowing neural node connections inside engine -->
      <g stroke="#ffffff" stroke-opacity="0.3" stroke-width="0.75">
        <circle cx="-6" cy="-4" r="2" fill="#ff6b35" stroke="none"/>
        <circle cx="6" cy="-4" r="2" fill="#ff6b35" stroke="none"/>
        <circle cx="0" cy="6" r="2" fill="#ff6b35" stroke="none"/>
        <line x1="-6" y1="-4" x2="6" y2="-4" />
        <line x1="6" y1="-4" x2="0" y2="6" />
        <line x1="0" y1="6" x2="-6" y2="-4" />
      </g>
      <text x="0" y="32" font-family="monospace" font-size="9" fill="#a3a3a3" text-anchor="middle" letter-spacing="0.5">INFERENCE_ENG</text>
    </g>
    
    <!-- Node G: Cloud Output (Right End) -->
    <g transform="translate(700, 225)">
      <circle cx="0" cy="0" r="10" fill="#171717" stroke="#ffffff" stroke-width="1.5" stroke-opacity="0.4"/>
      <text x="0" y="24" font-family="monospace" font-size="8" fill="#a3a3a3" text-anchor="middle">OUTPUT</text>
    </g>
  </g>

  <!-- Technical Annotations -->
  <text x="50" y="60" font-family="monospace" font-size="10" fill="#a3a3a3" opacity="0.4" letter-spacing="1">HOST: AWS_EC2 / ENGINE: FLASK_WSGI / STACK: SCIKIT-LEARN</text>
  <text x="750" y="60" font-family="monospace" font-size="10" fill="#a3a3a3" opacity="0.4" text-anchor="end" letter-spacing="1">SYS.LOC: //CLOUD/BRAIN_STROKE</text>
</svg>

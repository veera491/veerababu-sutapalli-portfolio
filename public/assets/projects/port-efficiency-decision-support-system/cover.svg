<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <title>Port Efficiency Decision Support System</title>
  <desc>Abstract visualization of port terminal flows, efficiency heatmaps, and routing analysis.</desc>
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#121212"/>
    </linearGradient>
    
    <radialGradient id="accent-glow" cx="20%" cy="80%" r="70%">
      <stop offset="0%" stop-color="#ff6b35" stop-opacity="0.08"/>
      <stop offset="80%" stop-color="#ff6b35" stop-opacity="0.01"/>
      <stop offset="100%" stop-color="#ff6b35" stop-opacity="0"/>
    </radialGradient>

    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="1" stroke-opacity="0.02"/>
    </pattern>

    <!-- Cargo flow gradients -->
    <linearGradient id="flow-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6b35" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#a3a3a3" stop-opacity="0.2"/>
    </linearGradient>
  </defs>

  <!-- Background and Ambient Glow -->
  <rect width="100%" height="100%" fill="url(#bg-grad)"/>
  <rect width="100%" height="100%" fill="url(#accent-glow)"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <!-- Outer border -->
  <rect x="30" y="30" width="740" height="390" fill="none" stroke="#ffffff" stroke-width="1" stroke-opacity="0.05"/>

  <!-- Port Berth Layout (Abstract Outlines) -->
  <path d="M 100 100 L 100 250 L 300 250 L 300 180 L 480 180 L 480 300 L 680 300" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-opacity="0.1" stroke-linecap="round"/>
  <path d="M 100 110 L 100 240 L 290 240 L 290 190 L 490 190 L 490 290 L 680 290" fill="none" stroke="#ff6b35" stroke-width="1" stroke-opacity="0.2" stroke-linecap="round"/>

  <!-- Abstract Container Storage Yard Grids -->
  <g fill="none" stroke="#ffffff" stroke-width="0.5" stroke-opacity="0.15">
    <!-- Yard Block A -->
    <rect x="130" y="80" width="80" height="120" />
    <line x1="150" y1="80" x2="150" y2="200" />
    <line x1="170" y1="80" x2="170" y2="200" />
    <line x1="190" y1="80" x2="190" y2="200" />
    <!-- Yard Block B -->
    <rect x="350" y="60" width="100" height="90" />
    <line x1="350" y1="90" x2="450" y2="90" />
    <line x1="350" y1="120" x2="450" y2="120" />
  </g>

  <!-- Flow Routes / Ship Tracks -->
  <path d="M 80 320 Q 200 350 320 220 T 520 250 T 700 120" fill="none" stroke="url(#flow-grad)" stroke-width="2" stroke-opacity="0.7" stroke-dasharray="8 4" stroke-linecap="round"/>
  <path d="M 120 360 Q 260 300 400 320 T 680 220" fill="none" stroke="#ffffff" stroke-width="1" stroke-opacity="0.2" stroke-dasharray="2 4"/>

  <!-- Efficiency Metric Nodes (Highlighting Bottlenecks or Flow Nodes) -->
  <g transform="translate(320, 220)">
    <circle cx="0" cy="0" r="6" fill="#ff6b35" fill-opacity="0.8"/>
    <circle cx="0" cy="0" r="12" fill="none" stroke="#ff6b35" stroke-width="1" stroke-opacity="0.4"/>
    <text x="12" y="4" font-family="monospace" font-size="9" fill="#ff6b35" letter-spacing="1">NODE:04_DWELL_LIMIT</text>
  </g>
  
  <g transform="translate(520, 250)">
    <circle cx="0" cy="0" r="4" fill="#ffffff" fill-opacity="0.6"/>
    <circle cx="0" cy="0" r="8" fill="none" stroke="#ffffff" stroke-width="0.5" stroke-opacity="0.3"/>
  </g>

  <!-- Cargo Ship Abstraction -->
  <g transform="translate(620, 180) rotate(-15)">
    <path d="M -20 -8 L 15 -8 L 25 0 L 15 8 L -20 8 Z" fill="#171717" stroke="#ffffff" stroke-width="1" stroke-opacity="0.3"/>
    <!-- Cargo containers on ship -->
    <rect x="-15" y="-5" width="8" height="10" fill="#ff6b35" fill-opacity="0.4"/>
    <rect x="-5" y="-5" width="8" height="10" fill="#a3a3a3" fill-opacity="0.4"/>
    <rect x="5" y="-5" width="8" height="10" fill="#ffffff" fill-opacity="0.2"/>
  </g>

  <!-- Analytical Bar Chart (Bottom Left Overlay) -->
  <g transform="translate(60, 310)" fill="none" stroke="#ffffff" stroke-opacity="0.1">
    <rect x="0" y="0" width="120" height="70" fill="#050505" fill-opacity="0.4" stroke-width="0.5"/>
    <line x1="10" y1="60" x2="110" y2="60" stroke-opacity="0.3"/>
    <!-- Bars -->
    <rect x="20" y="35" width="10" height="25" fill="#a3a3a3" fill-opacity="0.3" stroke="none"/>
    <rect x="40" y="20" width="10" height="40" fill="#a3a3a3" fill-opacity="0.3" stroke="none"/>
    <rect x="60" y="10" width="10" height="50" fill="#ff6b35" fill-opacity="0.6" stroke="none"/>
    <rect x="80" y="30" width="10" height="30" fill="#a3a3a3" fill-opacity="0.3" stroke="none"/>
    <rect x="100" y="45" width="10" height="15" fill="#a3a3a3" fill-opacity="0.3" stroke="none"/>
  </g>

  <!-- Labels & Metadata -->
  <text x="50" y="60" font-family="monospace" font-size="10" fill="#a3a3a3" opacity="0.4" letter-spacing="1">DATASET: BALTIC_GERMAN_PORTS / RECORDS: 1,330,169</text>
  <text x="750" y="60" font-family="monospace" font-size="10" fill="#a3a3a3" opacity="0.4" text-anchor="end" letter-spacing="1">SYS.LOC: //ANALYTICS/PORT_EFF_DSS</text>
  <text x="190" y="375" font-family="monospace" font-size="9" fill="#a3a3a3" opacity="0.5" letter-spacing="1">REGRESSION MODEL COMPARISON</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <title>Pin Your Spot</title>
  <desc>Technical schema of a location-based mobile mapping system and coordinate database representation.</desc>
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#121212"/>
    </linearGradient>
    
    <radialGradient id="accent-glow" cx="10%" cy="10%" r="80%">
      <stop offset="0%" stop-color="#ff6b35" stop-opacity="0.08"/>
      <stop offset="80%" stop-color="#ff6b35" stop-opacity="0.01"/>
      <stop offset="100%" stop-color="#ff6b35" stop-opacity="0"/>
    </radialGradient>

    <!-- Perspective grid pattern or custom path grid -->
    <linearGradient id="grid-fade" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.00"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bg-grad)"/>
  <rect width="100%" height="100%" fill="url(#accent-glow)"/>

  <!-- Perspective Coordinate Grid -->
  <g stroke="url(#grid-fade)" stroke-width="1" fill="none">
    <!-- Perspective horizontal lines -->
    <line x1="-200" y1="400" x2="1000" y2="400" />
    <line x1="-150" y1="360" x2="950" y2="360" />
    <line x1="-100" y1="320" x2="900" y2="320" />
    <line x1="-50" y1="280" x2="850" y2="280" />
    <line x1="0" y1="240" x2="800" y2="240" />
    <line x1="50" y1="200" x2="750" y2="200" />
    <line x1="100" y1="160" x2="700" y2="160" />
    <line x1="150" y1="120" x2="650" y2="120" />
    
    <!-- Vanishing point perspective lines -->
    <line x1="400" y1="60" x2="-200" y2="420" />
    <line x1="400" y1="60" x2="0" y2="420" />
    <line x1="400" y1="60" x2="200" y2="420" />
    <line x1="400" y1="60" x2="400" y2="420" />
    <line x1="400" y1="60" x2="600" y2="420" />
    <line x1="400" y1="60" x2="800" y2="420" />
    <line x1="400" y1="60" x2="1000" y2="420" />
  </g>

  <!-- Border -->
  <rect x="30" y="30" width="740" height="390" fill="none" stroke="#ffffff" stroke-width="1" stroke-opacity="0.05"/>

  <!-- Mobile phone device outline wireframe (Left) -->
  <g transform="translate(180, 220)" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1" fill="none">
    <rect x="-70" y="-130" width="140" height="260" rx="15" stroke-opacity="0.2"/>
    <!-- Screen boundary -->
    <rect x="-64" y="-115" width="128" height="230" rx="8" />
    <!-- Speaker / camera notch -->
    <rect x="-20" y="-123" width="40" height="6" rx="3" fill="#ffffff" fill-opacity="0.05"/>
    <circle cx="28" cy="-120" r="2" fill="#ffffff" fill-opacity="0.1"/>
    
    <!-- Stylized UI element on screen -->
    <rect x="-50" y="-90" width="100" height="35" rx="4" fill="#ffffff" fill-opacity="0.02"/>
    <text x="-40" y="-70" font-family="monospace" font-size="8" fill="#a3a3a3" stroke="none">SEARCH: "COFFEE"</text>
    
    <rect x="-50" y="-45" width="100" height="20" rx="4" fill="#ff6b35" fill-opacity="0.1" stroke="#ff6b35" stroke-opacity="0.3"/>
    <circle cx="-38" cy="-35" r="4" fill="#ff6b35" stroke="none"/>
    <text x="-26" y="-32" font-family="monospace" font-size="8" fill="#ff6b35" stroke="none" font-weight="bold">PIN SAVED</text>
  </g>

  <!-- Map connections and geographic nodes (Right side) -->
  <g stroke-linecap="round" fill="none">
    <!-- Path on map -->
    <path d="M 420 320 Q 500 240 580 280 T 680 160" stroke="#ffffff" stroke-opacity="0.15" stroke-width="1.5" stroke-dasharray="4 4"/>
    
    <!-- Primary Geo-Pin Node (Glowing) -->
    <g transform="translate(580, 280)">
      <!-- Radar ring -->
      <circle cx="0" cy="0" r="16" fill="none" stroke="#ff6b35" stroke-width="0.5" stroke-opacity="0.3"/>
      <circle cx="0" cy="0" r="28" fill="none" stroke="#ff6b35" stroke-width="0.5" stroke-opacity="0.15" stroke-dasharray="4 2"/>
      
      <!-- Geo pin stem line from perspective grid -->
      <line x1="0" y1="0" x2="0" y2="-45" stroke="#ff6b35" stroke-width="1.5"/>
      <circle cx="0" cy="-45" r="8" fill="#171717" stroke="#ff6b35" stroke-width="2.5"/>
      <circle cx="0" cy="-45" r="2" fill="#ff6b35" stroke="none"/>
      
      <text x="14" y="-42" font-family="monospace" font-size="9" fill="#ff6b35" font-weight="bold" stroke="none" letter-spacing="0.5">SPOT: #091</text>
    </g>

    <!-- Secondary Node -->
    <g transform="translate(420, 320)">
      <line x1="0" y1="0" x2="0" y2="-30" stroke="#ffffff" stroke-opacity="0.4" stroke-width="1"/>
      <circle cx="0" cy="-30" r="6" fill="#171717" stroke="#ffffff" stroke-width="1.5" stroke-opacity="0.6"/>
    </g>

    <!-- Tertiary Node -->
    <g transform="translate(680, 160)">
      <line x1="0" y1="0" x2="0" y2="-30" stroke="#ffffff" stroke-opacity="0.4" stroke-width="1"/>
      <circle cx="0" cy="-30" r="6" fill="#171717" stroke="#ffffff" stroke-width="1.5" stroke-opacity="0.6"/>
    </g>
  </g>

  <!-- Technical Coordinates (Top Right) -->
  <text x="750" y="100" font-family="monospace" font-size="8" fill="#a3a3a3" opacity="0.4" text-anchor="end">LOC: 16.5062° N, 80.6480° E</text>
  <text x="750" y="115" font-family="monospace" font-size="8" fill="#a3a3a3" opacity="0.4" text-anchor="end">LOC: 56.1612° N, 15.5869° E</text>

  <!-- Metadata -->
  <text x="50" y="60" font-family="monospace" font-size="10" fill="#a3a3a3" opacity="0.4" letter-spacing="1">SYSTEM: HYBRID_GPS_WIFI / ENVIRONMENT: MOBILE_NATIVE</text>
  <text x="750" y="60" font-family="monospace" font-size="10" fill="#a3a3a3" opacity="0.4" text-anchor="end" letter-spacing="1">SYS.LOC: //MOBILE/PIN_YOUR_SPOT</text>
</svg>
